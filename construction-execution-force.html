<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0e1a; color: #e0e4ef; overflow: hidden;
    display: flex; flex-direction: column; height: 100vh;
  }

  /* HEADER */
  #header {
    height: 44px; display: flex; align-items: center; padding: 0 16px; gap: 14px;
    background: rgba(10,14,26,0.92); backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; z-index: 30;
  }
  #header h1 {
    font-size: 15px; font-weight: 700; white-space: nowrap;
    background: linear-gradient(135deg, #ffb74d, #66bb6a, #ce93d8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  #search {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 5px; padding: 5px 10px; color: #e0e4ef; font-size: 11px;
    width: 180px; outline: none;
  }
  #search:focus { border-color: rgba(255,255,255,0.25); }
  #search::placeholder { color: #4a5070; }
  .legend { display: flex; gap: 14px; margin-left: auto; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #6b7394; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  /* MAIN LAYOUT */
  #main { display: flex; flex: 1; overflow: hidden; gap: 64px; padding: 16px 24px; }

  /* COLUMNS */
  .column {
    display: flex; flex-direction: column; flex: 1;
    border-radius: 8px; position: relative; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.05);
  }
  #col-phases { background: rgba(255,183,77,0.02); }
  #col-elements { background: rgba(102,187,106,0.02); }
  #col-resources { background: rgba(255,255,255,0.015); }

  .col-header {
    padding: 10px 14px; font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase; display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    backdrop-filter: blur(8px); flex-shrink: 0; z-index: 5;
  }
  .col-header .dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .col-header .count { font-size: 10px; font-weight: 400; color: #4a5070; margin-left: auto; }

  .column-body {
    flex: 1; overflow-y: auto; padding: 4px 0 20px;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent;
  }
  .column-body::-webkit-scrollbar { width: 4px; }
  .column-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  /* CATEGORY HEADERS */
  .cat-header {
    font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    padding: 10px 14px 3px; transition: opacity 0.35s ease;
  }
  .cat-header.dimmed { opacity: 0.03; }

  /* ITEMS */
  .item {
    padding: 7px 14px; font-size: 12px; cursor: pointer; position: relative;
    border-left: 2px solid transparent; display: flex; align-items: center; gap: 10px;
    transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1),
                opacity 0.35s ease,
                background 0.25s ease,
                border-color 0.25s ease;
    z-index: 2;
  }
  .item:hover { background: rgba(255,255,255,0.04); }
  .item .item-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item .edge-tag {
    font-size: 9px; font-weight: 600; letter-spacing: 0.3px; opacity: 0.7;
    margin-left: auto; white-space: nowrap; flex-shrink: 0;
    padding: 2px 8px; border-radius: 3px; background: rgba(255,255,255,0.08);
  }

  /* ITEM STATES */
  .item.selected {
    border-left-color: var(--col-color); z-index: 4;
    background: rgba(255,255,255,0.1); font-weight: 600;
  }
  .item.highlighted {
    border-left-color: var(--col-color); z-index: 3;
    background: rgba(255,255,255,0.06);
  }
  .item.dimmed { opacity: 0.04; pointer-events: none; }
  .item.search-match { background: rgba(255,255,255,0.06); }
  .item.search-dim { opacity: 0.12; }

  /* Phases colors */
  #col-phases .col-header { color: #ffb74d; }
  #col-phases .cat-header { color: rgba(255,183,77,0.4); }
  #col-phases .item { color: #b0986a; --col-color: #ffb74d; }
  #col-phases .item:hover { color: #ffb74d; }
  #col-phases .item.selected, #col-phases .item.highlighted { color: #ffb74d; }

  /* Elements colors */
  #col-elements .col-header { color: #66bb6a; }
  #col-elements .cat-header { color: rgba(102,187,106,0.4); }
  #col-elements .item { color: #7ab87e; --col-color: #66bb6a; }
  #col-elements .item:hover { color: #66bb6a; }
  #col-elements .item.selected, #col-elements .item.highlighted { color: #66bb6a; }

  /* Resources — Trades (purple) */
  #col-resources .cat-trades .cat-header { color: rgba(206,147,216,0.4); }
  #col-resources .item[data-cat="Trades"] { color: #b38dc0; --col-color: #ce93d8; }
  #col-resources .item[data-cat="Trades"]:hover { color: #ce93d8; }
  #col-resources .item[data-cat="Trades"].selected,
  #col-resources .item[data-cat="Trades"].highlighted { color: #ce93d8; }

  /* Resources — Equipment (cyan) */
  #col-resources .cat-equipment .cat-header { color: rgba(77,208,225,0.4); }
  #col-resources .item[data-cat="Equipment"] { color: #6eb8c2; --col-color: #4dd0e1; }
  #col-resources .item[data-cat="Equipment"]:hover { color: #4dd0e1; }
  #col-resources .item[data-cat="Equipment"].selected,
  #col-resources .item[data-cat="Equipment"].highlighted { color: #4dd0e1; }

  /* Resources — Materials (coral) */
  #col-resources .cat-materials .cat-header { color: rgba(255,138,101,0.4); }
  #col-resources .item[data-cat="Materials"] { color: #c28a70; --col-color: #ff8a65; }
  #col-resources .item[data-cat="Materials"]:hover { color: #ff8a65; }
  #col-resources .item[data-cat="Materials"].selected,
  #col-resources .item[data-cat="Materials"].highlighted { color: #ff8a65; }

  /* Resources column header — use a neutral mix */
  #col-resources .col-header { color: #b0b0b0; }

  /* SVG OVERLAY */
  #lines-svg {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    pointer-events: none; z-index: 10;
  }
  #lines-svg .edge-line {
    fill: none; stroke-linecap: round;
  }

  /* HINT */
  .hint {
    position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
    font-size: 10px; color: #3e4560; z-index: 20; pointer-events: none;
    transition: opacity 0.3s;
  }
  .stats {
    position: fixed; bottom: 10px; right: 14px;
    font-size: 9px; color: #3e4560; z-index: 20;
  }
</style>

// RENDER COLUMNS
// =====================================================
// Resource subcategory colors
const resCatColors = {
  'Trades': '#ce93d8',
  'Equipment': '#4dd0e1',
  'Materials': '#ff8a65'
};

function renderColumn(bodyId, groups, color) {
  const body = document.getElementById(bodyId);
  groups.forEach(group => {
    const catClass = 'cat-' + group.cat.toLowerCase().replace(/\s+/g, '-');
    const wrapper = document.createElement('div');
    wrapper.className = catClass;
    const h = document.createElement('div');
    h.className = 'cat-header';
    h.style.color = color;
    h.textContent = group.cat;
    wrapper.appendChild(h);
    body.appendChild(wrapper);
    group.items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'item';
      el.dataset.id = item.id;
      el.dataset.cat = group.cat;
      el.innerHTML = '<span class="item-name">' + item.name + '</span>';
      body.appendChild(el);
    });
  });
}

// Build element groups in order
const elCatOrder = ['Site & Earthwork','Foundations','Site Utilities','Structure','Enclosure',
  'Roofing','HVAC','Plumbing','Electrical','Fire Protection','Low Voltage','Interiors',
  'Conveying','Site Improvements'];
const elementGroups = elCatOrder.map(cat => ({
  cat, items: graphNodes.filter(n => n.domain === 'elements' && n.cat === cat)
})).filter(g => g.items.length > 0);

const resCatOrder = ['Trades','Equipment','Materials'];
const resourceGroups = resCatOrder.map(cat => ({
  cat, items: graphNodes.filter(n => n.domain === 'resources' && n.cat === cat)
})).filter(g => g.items.length > 0);

renderColumn('body-phases', phaseGroups, 'rgba(255,183,77,0.45)');
renderColumn('body-elements', elementGroups, 'rgba(102,187,106,0.45)');
// Resources uses per-category colors for headers
const resCatHeaderColors = {
  'Trades': 'rgba(206,147,216,0.45)',
  'Equipment': 'rgba(77,208,225,0.45)',
  'Materials': 'rgba(255,138,101,0.45)'
};
(function renderResources() {
  const body = document.getElementById('body-resources');
  resourceGroups.forEach(group => {
    const catClass = 'cat-' + group.cat.toLowerCase().replace(/\s+/g, '-');
    const wrapper = document.createElement('div');
    wrapper.className = catClass;
    const h = document.createElement('div');
    h.className = 'cat-header';
    h.style.color = resCatHeaderColors[group.cat] || 'rgba(206,147,216,0.45)';
    h.textContent = group.cat;
    wrapper.appendChild(h);
    body.appendChild(wrapper);
    group.items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'item';
      el.dataset.id = item.id;
      el.dataset.cat = group.cat;
      el.innerHTML = '<span class="item-name">' + item.name + '</span>';
      body.appendChild(el);
    });
  });
})();

// Count items
const phaseCount = phaseGroups.reduce((s, g) => s + g.items.length, 0);
const elemCount = elementGroups.reduce((s, g) => s + g.items.length, 0);
const resCount = resourceGroups.reduce((s, g) => s + g.items.length, 0);
document.getElementById('cnt-phases').textContent = phaseCount;
document.getElementById('cnt-elements').textContent = elemCount;
document.getElementById('cnt-resources').textContent = resCount;
document.getElementById('stats').textContent =
  phaseCount + ' phases · ' + elemCount + ' elements · ' + resCount + ' resources · ' + allEdges.length + ' edges';

// Index all item elements by ID
const itemEls = {};
document.querySelectorAll('.item').forEach(el => { itemEls[el.dataset.id] = el; });

// Map each item ID to its column body element
const itemColBody = {};
['body-phases','body-elements','body-resources'].forEach(bodyId => {
  document.querySelectorAll('#' + bodyId + ' .item').forEach(el => {
    itemColBody[el.dataset.id] = document.getElementById(bodyId);
  });
});

// Map each item ID to its color (phases/elements use column color, resources use subcategory color)
const itemColor = {};
document.querySelectorAll('#body-phases .item').forEach(el => { itemColor[el.dataset.id] = '#ffb74d'; });
document.querySelectorAll('#body-elements .item').forEach(el => { itemColor[el.dataset.id] = '#66bb6a'; });
document.querySelectorAll('#body-resources .item').forEach(el => {
  itemColor[el.dataset.id] = resCatColors[el.dataset.cat] || '#ce93d8';
});

// =====================================================
// SELECTION LOGIC
// =====================================================
let selectedId = null;
const linesSvg = document.getElementById('lines-svg');
const hint = document.getElementById('hint');

function selectItem(id) {
  if (selectedId === id) { resetSelection(); return; }
  selectedId = id;

  const neighbors = adj[id] || new Set();
  const visibleIds = new Set([id, ...neighbors]);

  // Find the name for the hint
  const clickedEl = itemEls[id];
  const clickedName = clickedEl ? clickedEl.querySelector('.item-name').textContent : id;
  hint.textContent = clickedName + ' — ' + neighbors.size + ' connections · Click again to deselect';

  // Process each column body
  const bodies = [
    document.getElementById('body-phases'),
    document.getElementById('body-elements'),
    document.getElementById('body-resources')
  ];

  bodies.forEach(body => {
    const col = body.parentElement;
    const bodyRect = body.getBoundingClientRect();
    const centerY = bodyRect.top + bodyRect.height / 2;

    // Save scroll position and lock
    body.dataset.savedScroll = body.scrollTop;
    body.style.overflow = 'hidden';

    const items = body.querySelectorAll('.item');
    const toCenter = [];

    items.forEach(item => {
      const iid = item.dataset.id;
      // Remove old edge tags
      item.querySelectorAll('.edge-tag').forEach(t => t.remove());

      if (iid === id) {
        item.classList.add('selected');
        item.classList.remove('dimmed', 'highlighted');
        toCenter.push(item);
      } else if (visibleIds.has(iid)) {
        item.classList.add('highlighted');
        item.classList.remove('dimmed', 'selected');
        toCenter.push(item);
      } else {
        item.classList.add('dimmed');
        item.classList.remove('highlighted', 'selected');
      }
    });

    // Dim category headers
    body.querySelectorAll('.cat-header').forEach(h => h.classList.add('dimmed'));

    // Center the group vertically
    if (toCenter.length > 0) {
      const itemH = 32;
      const maxH = bodyRect.height * 0.88;
      const naturalH = toCenter.length * itemH;
      const gap = naturalH > maxH ? Math.max(0, (maxH - toCenter.length * 26) / Math.max(1, toCenter.length - 1)) : 6;
      const effectiveItemH = naturalH > maxH ? 26 : itemH;
      const totalH = toCenter.length * effectiveItemH + Math.max(0, toCenter.length - 1) * gap;
      let targetTop = centerY - totalH / 2;

      toCenter.forEach((item, i) => {
        const rect = item.getBoundingClientRect();
        const offset = targetTop - rect.top;
        item.style.transform = 'translateY(' + offset + 'px)';
        item.style.transitionDelay = (i * 20) + 'ms';
        targetTop += effectiveItemH + gap;
      });
    }
  });

  // Draw lines after animation settles
  setTimeout(drawLines, 480);
}

function resetSelection() {
  selectedId = null;
  hint.textContent = 'Click any item to see its connections';
  linesSvg.innerHTML = '';

  document.querySelectorAll('.item').forEach(item => {
    item.classList.remove('selected', 'highlighted', 'dimmed');
    item.style.transform = '';
    item.style.transitionDelay = '';
    item.querySelectorAll('.edge-tag').forEach(t => t.remove());
  });

  document.querySelectorAll('.cat-header').forEach(h => h.classList.remove('dimmed'));

  // Restore scroll
  ['body-phases','body-elements','body-resources'].forEach(id => {
    const body = document.getElementById(id);
    body.style.overflow = '';
    if (body.dataset.savedScroll) {
      body.scrollTop = parseInt(body.dataset.savedScroll);
    }
  });
}

// =====================================================
// DRAW LINES
// =====================================================
// Build a directed edge lookup: "source|target" -> true (to know original direction)
const directedEdge = {};
allEdges.forEach(([s, t]) => { directedEdge[s + '|' + t] = true; });

function drawLines() {
  linesSvg.innerHTML = '';
  if (!selectedId) return;

  const clickedEl = itemEls[selectedId];
  if (!clickedEl) return;

  const neighbors = adj[selectedId] || new Set();

  neighbors.forEach(nid => {
    const targetEl = itemEls[nid];
    if (!targetEl) return;

    // Determine original edge direction
    const clickedIsSource = directedEdge[selectedId + '|' + nid];
    const srcId = clickedIsSource ? selectedId : nid;
    const dstId = clickedIsSource ? nid : selectedId;
    const srcEl = clickedIsSource ? clickedEl : targetEl;
    const dstEl = clickedIsSource ? targetEl : clickedEl;

    const srcRect = srcEl.getBoundingClientRect();
    const dstRect = dstEl.getBoundingClientRect();

    let x1, y1, x2, y2;
    const srcCX = srcRect.left + srcRect.width / 2;
    const dstCX = dstRect.left + dstRect.width / 2;

    if (srcCX < dstCX) {
      x1 = srcRect.right - 4;
      x2 = dstRect.left + 4;
    } else if (srcCX > dstCX) {
      x1 = srcRect.left + 4;
      x2 = dstRect.right - 4;
    } else {
      x1 = srcRect.right - 4;
      x2 = dstRect.right - 4;
    }
    y1 = srcRect.top + srcRect.height / 2;
    y2 = dstRect.top + dstRect.height / 2;

    const dx = x2 - x1;
    const cp1x = x1 + dx * 0.4;
    const cp2x = x1 + dx * 0.6;

    // Use target node color for the line
    const color = itemColor[dstId] || '#556';

    // Draw the bezier curve (shorten slightly so arrow sits at end)
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M ' + x1 + ' ' + y1 + ' C ' + cp1x + ' ' + y1 + ', ' + cp2x + ' ' + y2 + ', ' + x2 + ' ' + y2);
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('opacity', '0');
    path.classList.add('edge-line');
    linesSvg.appendChild(path);

    // Draw arrowhead as a separate polygon at the end of the curve
    // Tangent at t=1 of cubic bezier: 3*(P3 - P2) = 3*(x2-cp2x, y2-y2) = 3*(x2-cp2x, 0)
    const tx = x2 - cp2x;
    const ty = y2 - y2; // always 0 for our cp2y=y2
    const len = Math.sqrt(tx * tx + ty * ty) || 1;
    const ux = tx / len;
    const uy = ty / len;
    // Perpendicular
    const px = -uy;
    const py = ux;
    const arrowLen = 10;
    const arrowW = 5;
    // Tip at (x2, y2), base pulled back along tangent
    const bx = x2 - ux * arrowLen;
    const by = y2 - uy * arrowLen;
    const points = [
      x2 + ',' + y2,
      (bx + px * arrowW) + ',' + (by + py * arrowW),
      (bx - px * arrowW) + ',' + (by - py * arrowW)
    ].join(' ');
    const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    arrow.setAttribute('points', points);
    arrow.setAttribute('fill', color);
    arrow.setAttribute('opacity', '0');
    arrow.classList.add('edge-arrow');
    linesSvg.appendChild(arrow);

    // Label at midpoint of the curve
    const label = edgeLabelMap[selectedId + '|' + nid] || edgeLabelMap[nid + '|' + selectedId] || '';
    if (label) {
      const mx = 0.125*x1 + 0.375*cp1x + 0.375*cp2x + 0.125*x2;
      const my = 0.125*y1 + 0.375*y1 + 0.375*y2 + 0.125*y2;
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', mx);
      text.setAttribute('y', my - 6);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('fill', color);
      text.setAttribute('font-size', '9');
      text.setAttribute('font-weight', '600');
      text.setAttribute('font-family', '-apple-system, BlinkMacSystemFont, sans-serif');
      text.setAttribute('opacity', '0');
      text.classList.add('edge-label');
      text.textContent = label;
      linesSvg.appendChild(text);
    }
  });

  // Animate in
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      linesSvg.querySelectorAll('.edge-line').forEach(p => {
        p.style.transition = 'opacity 0.35s ease';
        p.setAttribute('opacity', '0.6');
      });
      linesSvg.querySelectorAll('.edge-arrow').forEach(a => {
        a.style.transition = 'opacity 0.35s ease';
        a.setAttribute('opacity', '1');
      });
      linesSvg.querySelectorAll('.edge-label').forEach(t => {
        t.style.transition = 'opacity 0.35s ease 0.15s';
        t.setAttribute('opacity', '0.9');
      });
    });
  });
}

// =====================================================
// EVENT HANDLERS
// =====================================================
// Click on items
document.querySelectorAll('.item').forEach(el => {
  el.addEventListener('click', (e) => {
    e.stopPropagation();
    selectItem(el.dataset.id);
  });
});

// Click background to deselect
document.addEventListener('click', (e) => {
  if (selectedId && !e.target.closest('.item')) {
    resetSelection();
  }
});

// Escape to deselect
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && selectedId) {
    resetSelection();
  }
});

// Search
document.getElementById('search').addEventListener('input', function() {
  if (selectedId) resetSelection();
  const q = this.value.toLowerCase().trim();

  if (!q) {
    document.querySelectorAll('.item').forEach(el => {
      el.classList.remove('search-match', 'search-dim');
    });
    document.querySelectorAll('.cat-header').forEach(h => h.classList.remove('dimmed'));
    return;
  }

  document.querySelectorAll('.item').forEach(el => {
    const name = el.querySelector('.item-name').textContent.toLowerCase();
    if (name.includes(q)) {
      el.classList.add('search-match');
      el.classList.remove('search-dim');
    } else {
      el.classList.add('search-dim');
      el.classList.remove('search-match');
    }
  });

  // Dim headers with no visible items
  document.querySelectorAll('.cat-header').forEach(h => {
    let sib = h.nextElementSibling;
    let anyVisible = false;
    while (sib && sib.classList.contains('item')) {
      if (!sib.classList.contains('search-dim')) anyVisible = true;
      sib = sib.nextElementSibling;
    }
    h.classList.toggle('dimmed', !anyVisible);
  });
});

// Handle window resize — redraw lines if selected
window.addEventListener('resize', () => {
  if (selectedId) {
    linesSvg.innerHTML = '';
    // Re-center and redraw
    const id = selectedId;
    selectedId = null;
    resetSelection();
    requestAnimationFrame(() => selectItem(id));
  }
});
</script>
